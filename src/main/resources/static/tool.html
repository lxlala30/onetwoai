<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>开发者工具箱</title>
    <style>
        * {margin:0;padding:0;box-sizing:border-box;font-family:system-ui, sans-serif;}

        :root {
            --bg: #f5f7fa;
            --card: #fff;
            --text: #222;
            --text-light: #666;
            --border: #ddd;
            --primary: #0071e3;
            --input-bg: #fff;
            --result-bg: #f9f9f9;
        }

        [data-theme="dark"] {
            --bg: #1a1a1a;
            --card: #2a2a2a;
            --text: #eee;
            --text-light: #aaa;
            --border: #444;
            --primary: #3b9aff;
            --input-bg: #2a2a2a;
            --result-bg: #242424;
        }

        body {
            background: var(--bg);
            color: var(--text);
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
            transition: all 0.2s;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .api-config {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #apiBaseUrl {
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--input-bg);
            color: var(--text);
            width: 280px;
        }

        #saveApiUrl, #themeBtn {
            padding: 8px 12px;
            border-radius: 6px;
            border: none;
            background: var(--primary);
            color: #fff;
            cursor: pointer;
        }

        h1 {
            color: var(--text);
        }

        .tab {
            padding: 8px 12px;
            margin: 0 8px 12px 0;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            background: var(--card);
            color: var(--text);
        }
        .tab.active {
            background: var(--primary);
            color: #fff;
        }

        .box {
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        textarea {
            width: 100%;
            height: 320px;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--input-bg);
            color: var(--text);
            resize: vertical;
            font-family: monospace;
            font-size: 14px;
        }

        button {
            padding: 10px 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 6px;
            margin-bottom: 6px;
            transition: background 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        .result {
            padding: 12px;
            background: var(--result-bg);
            border-radius: 8px;
            white-space: pre-wrap;
            position: relative;
            border: 1px solid var(--border);
            word-wrap: break-word;
            overflow-wrap: break-word;
            max-width: 100%;
            min-height: 60px;
            font-family: monospace;
            font-size: 14px;
        }

        .copy-btn {
            position: absolute;
            top: 6px;
            right: 6px;
            padding: 4px 8px;
            font-size: 12px;
            background: var(--text-light);
        }
    </style>
</head>
<body>

<div class="header">
    <h1>开发者工具箱</h1>
    <div class="api-config">
        <!--        <input type="text" id="apiBaseUrl" placeholder="请输入后台接口地址，如：http://localhost:8081/api/tool">-->
        <!--        <button id="saveApiUrl">保存地址</button>-->
        <button id="themeBtn">切换深色模式</button>
    </div>
</div>

<div>
    <button class="tab active" onclick="show('json')">JSON格式化</button>
    <button class="tab" onclick="show('time')">时间戳</button>
    <button class="tab" onclick="show('url')">URL编解码</button>
    <button class="tab" onclick="show('base64')">Base64</button>
    <button class="tab" onclick="show('hash')">MD5</button>
    <button class="tab" onclick="show('pwd')">密码生成</button>
</div>

<div id="json" class="box panel">
    <textarea id="jsonInput" placeholder='输入JSON'></textarea>
    <div>
        <button onclick="fmtJson()">格式化</button>
    </div>
    <div id="jsonResult" class="result">
        <button class="copy-btn" onclick="copy('jsonResult')">复制</button>
    </div>
</div>

<div id="time" class="box panel" style="display:none;">
    <textarea id="tsInput" placeholder="输入时间戳"></textarea>
    <div>
        <button onclick="tsToDate()">转日期</button>
    </div>
    <div id="tsResult" class="result">
        <button class="copy-btn" onclick="copy('tsResult')">复制</button>
    </div>
</div>

<div id="url" class="box panel" style="display:none;">
    <textarea id="urlInput" placeholder="输入内容"></textarea>
    <div>
        <button onclick="urlEnc()">编码</button>
        <button onclick="urlDec()">解码</button>
    </div>
    <div id="urlResult" class="result">
        <button class="copy-btn" onclick="copy('urlResult')">复制</button>
    </div>
</div>

<div id="base64" class="box panel" style="display:none;">
    <textarea id="b64Input" placeholder="输入内容"></textarea>
    <div>
        <button onclick="b64Enc()">编码</button>
        <button onclick="b64Dec()">解码</button>
    </div>
    <div id="b64Result" class="result">
        <button class="copy-btn" onclick="copy('b64Result')">复制</button>
    </div>
</div>

<div id="hash" class="box panel" style="display:none;">
    <textarea id="hashInput" placeholder="输入字符串"></textarea>
    <div>
        <button onclick="md5()">MD5</button>
    </div>
    <div id="hashResult" class="result">
        <button class="copy-btn" onclick="copy('hashResult')">复制</button>
    </div>
</div>

<div id="pwd" class="box panel" style="display:none;">
    <div>
        <button onclick="genPwd()">生成16位密码</button>
    </div>
    <div id="pwdResult" class="result">
        <button class="copy-btn" onclick="copy('pwdResult')">复制</button>
    </div>
</div>

<script>
    // 改造：全局接口地址变量，优先从本地存储读取，默认值备用
    let apiBaseUrl = localStorage.getItem('apiBaseUrl') || "http://118.25.94.106:8082/api/tool";
    let current = "json";

    // 页面加载时初始化输入框值
    window.onload = function() {
        document.getElementById('apiBaseUrl').value = apiBaseUrl;
    }

    // 深色模式
    const themeBtn = document.getElementById('themeBtn');
    themeBtn.addEventListener('click', () => {
        const current = document.documentElement.getAttribute('data-theme');
        if (current === 'dark') {
            document.documentElement.removeAttribute('data-theme');
            themeBtn.textContent = '切换深色模式';
        } else {
            document.documentElement.setAttribute('data-theme', 'dark');
            themeBtn.textContent = '切换浅色模式';
        }
    });

    // 新增：保存接口地址的逻辑
    document.getElementById('saveApiUrl').addEventListener('click', function() {
        const newUrl = document.getElementById('apiBaseUrl').value.trim();
        if (!newUrl) {
            alert('请输入有效的后台接口地址！');
            return;
        }
        // 更新全局变量 + 本地存储（刷新页面不丢失）
        apiBaseUrl = newUrl;
        localStorage.setItem('apiBaseUrl', apiBaseUrl);
        alert('后台地址保存成功！');
    });

    function show(id) {
        document.querySelectorAll(".panel").forEach(p => p.style.display = "none");
        document.getElementById(id).style.display = "flex";
        current = id;
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        document.querySelectorAll(".tab")[
            {"json":0,"time":1,"url":2,"base64":3,"hash":4,"pwd":5}[id]
            ].classList.add("active");
    }

    // 复制
    function copy(resultId) {
        const text = document.getElementById(resultId).innerText.replace("复制", "").trim();
        navigator.clipboard.writeText(text).then(() => alert("复制成功"));
    }

    // 改造：API请求函数，使用全局的apiBaseUrl
    async function api(url, data) {
        try {
            const res = await fetch(apiBaseUrl + url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });
            // 增加错误处理
            if (!res.ok) {
                throw new Error(`接口请求失败：${res.status} ${res.statusText}`);
            }
            const j = await res.json();
            return j.data;
        } catch (e) {
            alert(`请求出错：${e.message}`);
            console.error('API请求错误：', e);
            return '';
        }
    }

    // 改造：修复结果渲染的错误（之前所有方法都渲染到b64Result）
    async function fmtJson() {
        const r = await api("/json/format", { json: document.getElementById("jsonInput").value });
        refreshText("jsonResult", r);
    }

    async function tsToDate() {
        const r = await api("/time/toDate", { timestamp: document.getElementById("tsInput").value });
        refreshText("tsResult", r);
    }

    async function urlEnc() {
        const r = await api("/url/encode", { str: document.getElementById("urlInput").value });
        refreshText("urlResult", r);
    }
    async function urlDec() {
        const r = await api("/url/decode", { str: document.getElementById("urlInput").value });
        refreshText("urlResult", r);
    }

    async function b64Enc() {
        const r = await api("/base64/encode", { str: document.getElementById("b64Input").value });
        refreshText("b64Result", r);
    }
    async function b64Dec() {
        const r = await api("/base64/decode", { str: document.getElementById("b64Input").value });
        refreshText("b64Result", r);
    }

    async function md5() {
        const r = await api("/hash/md5", { str: document.getElementById("hashInput").value });
        refreshText("hashResult", r);
    }

    async function genPwd() {
        const r = await api("/password/generate", { len:16 });
        refreshText("pwdResult", r);
    }

    function refreshText(resultId, data) {
        const container = document.getElementById(resultId);
        // 清空原有内容（保留复制按钮）
        while (container.firstChild && container.firstChild.nodeName !== 'BUTTON') {
            container.removeChild(container.firstChild);
        }
        // 添加新内容（放在复制按钮前面）
        const textNode = document.createTextNode(data || '');
        container.insertBefore(textNode, container.firstChild);
    }
</script>
</body>
</html>
